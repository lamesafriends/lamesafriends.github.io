<style>
    .bookstore-hours .row {
        display: flex;
        justify-content: space-between;
    }
    .bookstore-hours .row.today { font-weight: bold; font-size: 1.1em; }
</style>
<div class="content">
    <p>
        <div class="bookstore-hours">
            <div class="row">
                <div>Monday</div>
                <div>10 AM - 4 PM</div>
            </div>
            <div class="row">
                <div>Tuesday</div>
                <div>1 PM - 4 PM</div>
            </div>
            <div class="row">
                <div>Wednesday</div>
                <div>1 PM - 4 PM</div>
            </div>
            <div class="row">
                <div>Thursday</div>
                <div>10 AM - 4 PM</div>
            </div>
            <div class="row">
                <div>Friday</div>
                <div>1 PM - 4 PM</div>
            </div>
            <div class="row">
                <div>Saturday</div>
                <div>10 AM - 4 PM</div>
            </div>
            <div class="row">
                <div>Sunday</div>
                <div>10 AM - 1 PM</div>
            </div>
        </div>
    </p>
    <p style="font-size: 11px; margin-bottom: 0;">*Hours subject to change without notice</p>
</div>
<script>
    (function () {
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const today = days[new Date().getDay()];
        document.querySelectorAll('.bookstore-hours .row').forEach(function (row) {
            if (row.querySelector('div') && row.querySelector('div').textContent.trim() === today) {
                row.classList.add('today');
            }
        });
    })();
</script>
